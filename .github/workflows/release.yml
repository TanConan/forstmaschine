name: Build and Upload Web Release

on:
  push:
    tags:
      - "*.*.*"

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      GODOT_VERSION: ${{ vars.GODOT_VERSION }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Godot
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip
          unzip -q Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip
          chmod +x Godot_v${GODOT_VERSION}-stable_linux.x86_64
          sudo mv Godot_v${GODOT_VERSION}-stable_linux.x86_64 /usr/local/bin/godot

      - name: Install export templates
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_export_templates.tpz
          mkdir templates
          unzip -q Godot_v${GODOT_VERSION}-stable_export_templates.tpz -d templates

          mkdir -p ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable
          cp -r templates/templates/* ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable/

      - name: Import Assets
        run: |
          godot --headless --editor --quit-after-step 1

      - name: Export Web build
        run: |
          mkdir -p build/web
          godot --headless --export-release "Web" build/web/index.html

      - name: Download Butler
        run: |
          curl -L https://broth.itch.zone/butler/linux-amd64/LATEST/archive/default -o butler.zip
          unzip -q butler.zip
          chmod +x butler
          sudo mv butler /usr/local/bin/

      - name: Upload to itch.io
        env:
          BUTLER_API_KEY: ${{ secrets.ITCH_API_KEY }}
          ITCH_USERNAME: ${{ vars.ITCH_USERNAME }}
          ITCH_GAME_NAME: ${{ vars.ITCH_GAME_NAME }}
        run: |
          butler push \
            --userversion "${GITHUB_REF_NAME}" \
            build/web \
            ${ITCH_USERNAME}/${ITCH_GAME_NAME}:web
